name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag or commit to build
        required: true
        default: main

concurrency:
  group: build-android-apk
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-apk:
    name: Generate Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout selected ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Install dependencies
        run: npm ci

      - name: Build web assets and sync Android project
        run: npm run android:prepare

      - name: Configure Android SDK path
        run: |
          set -euo pipefail
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          test -n "$sdk_root"
          printf 'sdk.dir=%s\n' "$sdk_root" > android/local.properties

      - name: Build debug APK
        run: |
          set -euo pipefail
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: pauta-debug-apk-${{ github.run_number }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14

      - name: Job summary
        run: |
          {
            echo "## Android APK"
            echo
            echo "- Ref: \`${{ inputs.ref }}\`"
            echo "- Artifact: \`pauta-debug-apk-${{ github.run_number }}\`"
            echo "- APK path: \`android/app/build/outputs/apk/debug/app-debug.apk\`"
          } >> "$GITHUB_STEP_SUMMARY"
